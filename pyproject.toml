[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
markers = [
    "integration: opt-in tests requiring Docker/network (skipped by default; see tests/integration/)",
]

[tool.coverage.run]
source = ["app"]
